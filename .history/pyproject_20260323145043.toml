[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "comfyui-eric-alice-t2v"
version = "1.0.0"
description = "ComfyUI custom nodes for Alice T2V 14B MoE text-to-video generation"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Eric Rollei"}
]
keywords = [
    "comfyui",
    "custom-nodes",
    "text-to-video",
    "t2v",
    "alice",
    "video-generation",
    "ai",
    "diffusion"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Multimedia :: Video",
]
requires-python = ">=3.10"
dependencies = [
    "easydict",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[project.urls]
Homepage = "https://github.com/EricRollworker/comfyui-eric-alice-t2v"
Repository = "https://github.com/EricRollworker/comfyui-eric-alice-t2v"
Issues = "https://github.com/EricRollworker/comfyui-eric-alice-t2v/issues"
"Alice Model" = "https://huggingface.co/gomirageai/Alice-T2V-14B-MoE"
"Alice Source" = "https://github.com/mirage-video/Alice"

[tool.setuptools]
packages = ["nodes", "utils"]
include-package-data = true

[tool.setuptools.package-data]
"*" = ["*.md", "*.txt"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
